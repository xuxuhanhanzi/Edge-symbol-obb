# Project-specific CI for the Edge-symbol-obb fork.
#
# The upstream Ultralytics CI matrix is intentionally not used here. This
# repository carries grayscale RV1106 OBB customizations, so the useful signal is
# whether the project-specific model configs and scripts still build/import.

name: Edge Symbol OBB CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Project smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OMP_NUM_THREADS: "1"
      PYTHONUNBUFFERED: "1"
      YOLO_CONFIG_DIR: ${{ runner.temp }}/ultralytics-config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e . --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build project OBB configs
        shell: bash
        run: |
          python -B scripts/train/smoke_obb.py

      - name: Compile project scripts
        shell: python
        run: |
          import py_compile
          from pathlib import Path

          scripts = [
              Path("scripts/data/check_labels.py"),
              Path("scripts/data/quarantine_bad_samples.py"),
              Path("scripts/deploy_rv1106/convert_eval_rknn.py"),
              Path("scripts/eval/val_onnx_gray.py"),
              Path("scripts/export/export_gray_obb_onnx.py"),
              Path("scripts/train/smoke_obb.py"),
              Path("scripts/train/train_rv1106_smoke.py"),
          ]

          for script in scripts:
              py_compile.compile(str(script), doraise=True)
              print(f"compile_ok={script}")

# Ultralytics YOLOv8-OBB - NPU Multi-Scale Master Template
# =========================================================
# 🎛️ 规模控制台：请保留你需要的那组配置，将其余组注释掉（加 #）
# ⚠️ 警告：同一时间只能有一组 npu_channels 处于非注释状态！
# =========================================================

